<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.classList.add('has-js');</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — ClassTrack</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#6C5CE7" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,0&display=block" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 40px 20px; position: relative; overflow: hidden; }
    .nf__bg { position: absolute; inset: 0; z-index: 0; }
    .nf__inner { position: relative; z-index: 1; max-width: 520px; }
    .nf__code { font-family: 'Poppins'; font-weight: 800; font-size: clamp(80px, 18vw, 160px); line-height: 1; letter-spacing: -.04em; }
    .nf h1 { font-size: clamp(24px, 4vw, 34px); color: var(--ink); margin: 6px 0 12px; }
    .nf p { color: var(--text-soft); font-size: 17px; margin-bottom: 26px; }
    .nf__actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <main class="nf">
    <div class="nf__bg" aria-hidden="true">
      <span class="blob blob--1"></span>
      <span class="blob blob--3"></span>
    </div>
    <div class="nf__inner">
      <div class="nf__code grad">404</div>
      <h1>This page skipped class.</h1>
      <p>We couldn't find that page — but your semester is still on track.</p>
      <div class="nf__actions">
        <a href="/" class="btn btn--primary btn--lg magnetic" data-magnetic><span class="ms">home</span> Back home</a>
        <a href="/support/" class="btn btn--soft btn--lg">Contact support</a>
      </div>
    </div>
  </main>
  <script src="/script.js" defer></script>
</body>
</html>
